  - id: m1-004
    name: Implement sendReviewNotification method
    description: |
      Implement the service method that posts the Adaptive Card payload to the
      Teams webhook URL using fetch, with proper Effect error handling and logging.
    estimate_minutes: 60
    type: code
    dependencies: [m1-003]
    files:
      modify:
        - src/services/teams-notification.ts
    instructions: |
      **Objective:**
      Implement the actual webhook POST request with error handling.

      **Implementation Steps:**
      1. Open src/services/teams-notification.ts
      2. Add the implementation helper:
         ```typescript
         import { TeamsNotificationError } from "../errors/teams.js";

         /**
          * Send notification to Teams webhook
          */
         const executeSendNotification = (
           webhookUrl: string,
           data: ReviewNotificationData
         ): Effect.Effect<void, TeamsNotificationError> =>
           Effect.gen(function* () {
             yield* Effect.logDebug(`Sending Teams notification for PR #${data.prNumber}`);

             const payload = buildAdaptiveCardPayload(data);

             // Send webhook request using fetch
             const response = yield* Effect.tryPromise({
               try: () =>
                 fetch(webhookUrl, {
                   method: "POST",
                   headers: {
                     "Content-Type": "application/json",
                   },
                   body: JSON.stringify(payload),
                 }),
               catch: (error) =>
                 new TeamsNotificationError({
                   message: `Failed to send Teams notification: ${String(error)}`,
                 }),
             });

             // Check response status
             if (!response.ok) {
               return yield* Effect.fail(
                 new TeamsNotificationError({
                   message: `Teams webhook returned error: ${response.status} ${response.statusText}`,
                   statusCode: response.status,
                 })
               );
             }

             yield* Effect.logInfo(`✓ Teams notification sent for PR #${data.prNumber}`);
           });
         ```
      3. Add the service Layer implementation:
         ```typescript
         /**
          * Live implementation of TeamsNotificationService
          */
         export const TeamsNotificationServiceLive = Layer.succeed(
           TeamsNotificationService,
           TeamsNotificationService.of({
             sendReviewNotification: (webhookUrl: string, data: ReviewNotificationData) =>
               executeSendNotification(webhookUrl, data),
           })
         );
         ```

      **Constraints:**
      - ONLY modify src/services/teams-notification.ts
      - Use Effect.tryPromise for fetch wrapper
      - Map fetch errors to TeamsNotificationError
      - Check response.ok and fail with appropriate error
      - Use Effect.logDebug and Effect.logInfo for logging
      - Create Layer.succeed for service implementation

      **TDD Checklist:**
      - [ ] executeSendNotification is Effect-based
      - [ ] fetch wrapped in Effect.tryPromise
      - [ ] Response status checked and errors mapped
      - [ ] Logging includes PR number
      - [ ] TeamsNotificationServiceLive Layer exported
      - [ ] TypeScript compiles without errors

      **Validation:**
      ```bash
      pnpm run typecheck
      ```
      Expected: No type errors

      **Drift Policy:**
      If you encounter unexpected patterns or dependencies, STOP immediately.
      Do not fix mid-stream. Report the issue and await guidance.

    validation:
      commands:
        - pnpm run typecheck
      expected_output: "No type errors"
      on_failure: "Check Effect.tryPromise usage and error handling"

  - id: m1-005
    name: Add unit tests for TeamsNotificationService
    description: |
      Create comprehensive unit tests for the Teams notification service covering
      success scenarios, error scenarios, and adaptive card payload generation.
    estimate_minutes: 75
    type: test
    dependencies: [m1-004]
    files:
      create:
        - tests/services/teams-notification.test.ts
      touch_only:
        - src/services/teams-notification.ts
        - tests/services/github.test.ts
    instructions: |
      **Objective:**
      Create unit tests for TeamsNotificationService with mocked fetch.

      **Implementation Steps:**
      1. Create tests/services/teams-notification.test.ts
      2. Import vitest and Effect dependencies
      3. Create test suite structure:
         ```typescript
         import { describe, it, expect, vi } from "vitest";
         import { Effect, Exit } from "effect";
         import type { ReviewNotificationData } from "../../src/services/teams-notification.js";

         // Mock fetch globally
         const mockFetch = vi.fn();
         global.fetch = mockFetch as any;

         describe("TeamsNotificationService", () => {
           const testData: ReviewNotificationData = {
             prNumber: 123,
             prTitle: "Test PR",
             prAuthor: "testuser",
             prUrl: "https://github.com/test/repo/pull/123",
             reviewVerdict: "approve",
             commentUrl: "https://github.com/test/repo/pull/123#issuecomment-456",
             repository: "test/repo",
           };

           describe("sendReviewNotification", () => {
             it("should send notification successfully", async () => {
               // Setup mock response
               mockFetch.mockResolvedValueOnce({
                 ok: true,
                 status: 200,
                 statusText: "OK",
               });

               const { TeamsNotificationServiceLive } = await import(
                 "../../src/services/teams-notification.js"
               );

               const program = Effect.gen(function* () {
                 const service = yield* TeamsNotificationServiceLive;
                 yield* service.sendReviewNotification(
                   "https://webhook.url",
                   testData
                 );
               });

               const result = await Effect.runPromise(program);
               expect(result).toBeUndefined();
               expect(mockFetch).toHaveBeenCalledWith(
                 "https://webhook.url",
                 expect.objectContaining({
                   method: "POST",
                   headers: { "Content-Type": "application/json" },
                 })
               );
             });

             it("should handle webhook error response", async () => {
               mockFetch.mockResolvedValueOnce({
                 ok: false,
                 status: 400,
                 statusText: "Bad Request",
               });

               const { TeamsNotificationServiceLive } = await import(
                 "../../src/services/teams-notification.js"
               );

               const program = Effect.gen(function* () {
                 const service = yield* TeamsNotificationServiceLive;
                 yield* service.sendReviewNotification(
                   "https://webhook.url",
                   testData
                 );
               });

               const result = await Effect.runPromiseExit(program);
               expect(Exit.isFailure(result)).toBe(true);
               if (Exit.isFailure(result) && result.cause._tag === "Fail") {
                 expect(result.cause.error._tag).toBe("TeamsNotificationError");
               }
             });

             it("should handle network errors", async () => {
               mockFetch.mockRejectedValueOnce(new Error("Network error"));

               const { TeamsNotificationServiceLive } = await import(
                 "../../src/services/teams-notification.js"
               );

               const program = Effect.gen(function* () {
                 const service = yield* TeamsNotificationServiceLive;
                 yield* service.sendReviewNotification(
                   "https://webhook.url",
                   testData
                 );
               });

               const result = await Effect.runPromiseExit(program);
               expect(Exit.isFailure(result)).toBe(true);
             });

             it("should use correct card styling for approve verdict", async () => {
               mockFetch.mockResolvedValueOnce({
                 ok: true,
                 status: 200,
                 statusText: "OK",
               });

               const approveData = { ...testData, reviewVerdict: "approve" as const };

               const { TeamsNotificationServiceLive } = await import(
                 "../../src/services/teams-notification.js"
               );

               const program = Effect.gen(function* () {
                 const service = yield* TeamsNotificationServiceLive;
                 yield* service.sendReviewNotification(
                   "https://webhook.url",
                   approveData
                 );
               });

               await Effect.runPromise(program);

               const callBody = JSON.parse(mockFetch.mock.calls[0][1].body);
               expect(callBody.attachments[0].content.body[0].text).toContain("Approved");
               expect(callBody.attachments[0].content.body[0].color).toBe("Good");
             });

             it("should use correct card styling for request-changes verdict", async () => {
               mockFetch.mockResolvedValueOnce({
                 ok: true,
                 status: 200,
                 statusText: "OK",
               });

               const changesData = {
                 ...testData,
                 reviewVerdict: "request-changes" as const,
               };

               const { TeamsNotificationServiceLive } = await import(
                 "../../src/services/teams-notification.js"
               );

               const program = Effect.gen(function* () {
                 const service = yield* TeamsNotificationServiceLive;
                 yield* service.sendReviewNotification(
                   "https://webhook.url",
                   changesData
                 );
               });

               await Effect.runPromise(program);

               const callBody = JSON.parse(mockFetch.mock.calls[0][1].body);
               expect(callBody.attachments[0].content.body[0].text).toContain(
                 "Changes Required"
               );
               expect(callBody.attachments[0].content.body[0].color).toBe("Attention");
             });
           });
         });
         ```

      **Constraints:**
      - ONLY create tests/services/teams-notification.test.ts
      - Mock global fetch function
      - Test success case, error responses, network errors
      - Test all three verdict types for proper styling
      - Use Effect.runPromiseExit for error cases
      - Follow pattern from tests/services/github.test.ts

      **TDD Checklist:**
      - [ ] Tests cover success scenario
      - [ ] Tests cover webhook error response
      - [ ] Tests cover network errors
      - [ ] Tests verify correct card styling for all verdicts
      - [ ] All tests pass
      - [ ] No test warnings or errors

      **Validation:**
      ```bash
      pnpm run test tests/services/teams-notification.test.ts
      ```
      Expected: All tests pass

      **Drift Policy:**
      If you encounter unexpected patterns or dependencies, STOP immediately.
      Do not fix mid-stream. Report the issue and await guidance.

    validation:
      commands:
        - pnpm run test tests/services/teams-notification.test.ts
      expected_output: "All tests passing"
      on_failure: "Debug test failures and check mock setup"
