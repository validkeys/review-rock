      Schedule.spaced for polling GitHub at regular intervals.
    estimate_minutes: 45
    type: code
    dependencies: [m1-004]
    files:
      create:
        - src/services/polling.ts
        - tests/services/polling.test.ts
      modify: []
      touch_only: []
    instructions: |
      **Objective:**
      Define PollingService interface for repeating operations on a schedule.

      **Implementation Steps:**
      1. Create src/services/polling.ts with interface:
         - startPolling(repo: string): Effect<never, never, never>
      2. Define service interface (no implementation yet)
      3. Document that startPolling runs indefinitely (Effect<never>)
      4. Add test stub

      **Constraints:**
      - Follow Effect.Service pattern
      - Document return type (never succeeds, runs forever)

      **TDD Checklist:**
      - [ ] Write test stub (implementation in next task)
      - [ ] Verify interface compiles

      **Validation:**
      ```bash
      pnpm run typecheck
      ```
      Expected: Interface compiles successfully

      **Drift Policy:**
      N/A

    validation:
      commands:
        - pnpm run typecheck
      expected_output: "No type errors"
      on_failure: "Review service interface definition"

  - id: m1-006
    name: Implement PollingService with Effect.repeat
    description: |
      Implement PollingService that polls GitHub for unclaimed PRs using
      Effect.repeat with Schedule.spaced for 5-minute intervals.
    estimate_minutes: 90
    type: code
    dependencies: [m1-005]
    files:
      create: []
      modify:
        - src/services/polling.ts
        - tests/services/polling.test.ts
      touch_only:
        - src/services/github.ts
        - src/services/config.ts
    instructions: |
      **Objective:**
      Implement polling loop using Effect.repeat with configurable interval.

      **Implementation Steps:**
      1. Implement PollingServiceLive:
         - Depend on GitHubService and ConfigService
         - In startPolling:
           a. Get config to read pollingIntervalMinutes and claimLabel
           b. Define pollOnce effect that:
              - Calls GitHubService.listOpenPRs
              - Filters PRs without claimLabel
              - Returns first unclaimed PR or None
           c. Use Effect.repeat(pollOnce, Schedule.spaced(duration))
           d. Log each poll cycle
      2. Add unit tests with mocked GitHubService

      **Constraints:**
      - ONLY use Effect.repeat with Schedule.spaced for polling
      - NO setTimeout or setInterval
      - Follow pattern in style anchor: ~/Sites/ai-use-repos/EffectPatterns/retry-schedule-pattern.ts
      - Use Effect.provide to inject dependencies

      **TDD Checklist:**
      - [ ] Write test for pollOnce (mock GitHubService)
      - [ ] Write test for filtering unclaimed PRs
      - [ ] Write test for repeat schedule (verify interval)
      - [ ] Implement PollingService to pass tests
      - [ ] Verify logging occurs on each cycle

      **Validation:**
      ```bash
      pnpm test tests/services/polling.test.ts
      ```
      Expected: All PollingService tests pass

      **Drift Policy:**
      If Schedule.spaced is not available, verify Effect version.
      Do not implement custom polling loop.

    validation:
      commands:
        - pnpm test tests/services/polling.test.ts
        - pnpm run typecheck
      expected_output: "Tests pass and types check"
      on_failure: "Review Effect.repeat and Schedule usage"
