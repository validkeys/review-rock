  - id: m2-002
    name: Implement path matching logic for frontend files
    description: |
      Implement helper function to check if a file path matches frontend patterns.
      Frontend paths: apps/react-webapp, lib/core-ui-system.
    estimate_minutes: 60
    type: code
    dependencies: [m2-001]
    files:
      create: []
      modify:
        - src/services/classification.ts
        - tests/services/classification.test.ts
      touch_only:
        - src/types/pr-classification.ts
        - src/services/config.ts
    instructions: |
      **Objective:**
      Implement path matching logic for identifying frontend files.

      **Implementation Steps:**
      1. Add private helper function isFrontendPath:
         - Accept filePath: string and frontendPatterns: string[]
         - Use Array.some to check if filePath starts with any pattern
         - Return boolean
      2. Add unit tests:
         - apps/react-webapp/src/App.tsx → true
         - lib/core-ui-system/Button.tsx → true
         - src/services/api.ts → false
         - apps/api/routes.ts → false

      **Constraints:**
      - Use Array.some for pattern matching
      - Make patterns configurable (load from ConfigService later)
      - NO regex for MVP (simple string prefix matching)

      **TDD Checklist:**
      - [ ] Write test for apps/react-webapp path (should be frontend)
      - [ ] Write test for lib/core-ui-system path (should be frontend)
      - [ ] Write test for backend path (should not be frontend)
      - [ ] Implement isFrontendPath to pass tests
      - [ ] Verify with edge cases (empty path, nested paths)

      **Validation:**
      ```bash
      pnpm test tests/services/classification.test.ts -- isFrontendPath
      ```
      Expected: All path matching tests pass

      **Drift Policy:**
      If pattern matching is insufficient, document limitations.
      Do not add regex complexity in MVP.

    validation:
      commands:
        - pnpm test tests/services/classification.test.ts
      expected_output: "Path matching tests pass"
      on_failure: "Review string prefix matching logic"

  - id: m2-003
    name: Implement ClassificationService.classifyPR
    description: |
      Implement complete PR classification: frontend, backend, or mixed
      based on changed file paths.
    estimate_minutes: 75
    type: code
    dependencies: [m2-002]
    files:
      create: []
      modify:
        - src/services/classification.ts
        - tests/services/classification.test.ts
      touch_only:
        - src/services/config.ts
    instructions: |
      **Objective:**
      Implement full PR classification logic with all three types.

      **Implementation Steps:**
      1. Implement ClassificationServiceLive:
         - Depend on ConfigService to get frontendPaths config
         - In classifyPR(changedFiles):
           a. Separate files into frontend and backend arrays using isFrontendPath
           b. If only frontend files → return { type: "frontend", matchedPaths: frontendFiles }
           c. If only backend files → return { type: "backend", matchedPaths: backendFiles }
           d. If both → return { type: "mixed", matchedPaths: [...frontendFiles, ...backendFiles] }
      2. Add comprehensive unit tests:
         - Frontend-only PR
         - Backend-only PR
         - Mixed PR
         - Empty file list (edge case)

      **Constraints:**
      - Use functional composition (pipe, Array.filter, Array.partition)
      - NO mutable state (let variables)
      - Use Effect.provide to inject ConfigService in tests

      **TDD Checklist:**
      - [ ] Write test for frontend-only PR
      - [ ] Write test for backend-only PR
      - [ ] Write test for mixed PR
      - [ ] Write test for empty PR (no files changed)
      - [ ] Implement classifyPR to pass all tests
      - [ ] Refactor for clarity

      **Validation:**
      ```bash
      pnpm test tests/services/classification.test.ts
      ```
      Expected: All classification tests pass

      **Drift Policy:**
      If classification logic is ambiguous, STOP and clarify requirements.
      Document any edge cases discovered during testing.

    validation:
      commands:
        - pnpm test tests/services/classification.test.ts
        - pnpm run typecheck
      expected_output: "All tests pass and types check"
      on_failure: "Review classification logic and test coverage"

  - id: m2-004
    name: Add integration test for ClassificationService with real config
    description: |
      Create integration test that loads real configuration and tests
      classification against validkeys/lumen path structure.
    estimate_minutes: 45
    type: test
    dependencies: [m2-003]
    files:
      create:
        - tests/integration/classification.integration.test.ts
      modify: []
      touch_only:
        - src/services/classification.ts
        - src/services/config.ts
    instructions: |
      **Objective:**
      Verify ClassificationService works correctly with real configuration.

      **Implementation Steps:**
      1. Create integration test file
      2. Load ConfigService with real config (apps/react-webapp, lib/core-ui-system)
      3. Test realistic file path scenarios from validkeys/lumen:
         - apps/react-webapp/src/App.tsx → frontend
         - lib/core-ui-system/components/Button.tsx → frontend
         - apps/api/src/routes/user.ts → backend
         - package.json → backend
         - Mixed: both webapp and api files → mixed
      4. Use Effect.provide to wire services together

      **Constraints:**
      - Use real ConfigService (not mocked)
      - Test against actual validkeys/lumen path structure
      - Follow Effect.provide pattern for service composition

      **TDD Checklist:**
      - [ ] Write integration test with real config
      - [ ] Verify frontend path detection
      - [ ] Verify backend path detection
      - [ ] Verify mixed PR detection
      - [ ] Run test to validate

      **Validation:**
      ```bash
      pnpm test tests/integration/classification.integration.test.ts
      ```
      Expected: Integration tests pass with real config

      **Drift Policy:**
      If real config behavior differs from unit tests, update unit tests.
      Configuration should be the source of truth.

    validation:
      commands:
        - pnpm test tests/integration/classification.integration.test.ts
      expected_output: "Integration tests pass"
      on_failure: "Review config loading and service wiring"
