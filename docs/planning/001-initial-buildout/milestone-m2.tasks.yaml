milestone: m2
name: PR Classification Service
generated: "2026-03-30T18:00:00Z"

style_anchors:
  - path: ~/Sites/ai-use-repos/EffectPatterns/service-pattern.ts
    lines: 1-100
    description: |
      Effect.Service definition pattern with Effect.provide for dependency injection.
      Shows how to create service interfaces and live implementations.
  - path: ~/Sites/ai-use-repos/effect/examples/data-validation.ts
    lines: 1-80
    description: |
      Example of using Effect and data transformation pipelines.
      Shows functional composition and type-safe data processing.

global_constraints:
  allowed_patterns:
    - "Use Effect.Service for service definition"
    - "Use functional composition with pipe for data transformations"
    - "Use Schema validation for input types"
    - "Use Array.some and Array.every for path matching"
  forbidden_patterns:
    - "Mutable state or let variables for accumulation"
    - "Imperative loops (use Array methods)"
    - "Untyped classification logic"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - pnpm run typecheck
      - pnpm run lint
      - pnpm run test
  - stage: task-completion
    criteria:
      - All tests passing
      - No type errors
      - No lint errors
      - Classification logic covers all scenarios

tasks:
