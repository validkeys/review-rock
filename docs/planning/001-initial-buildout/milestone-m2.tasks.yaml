    estimate_minutes: 30
    type: code
    dependencies: []
    files:
      create:
        - src/services/classification.ts
        - src/types/pr-classification.ts
        - tests/services/classification.test.ts
      modify: []
      touch_only: []
    instructions: |
      **Objective:**
      Define ClassificationService interface and PR classification types.

      **Implementation Steps:**
      1. Create src/types/pr-classification.ts with:
         - PRType enum: "frontend" | "backend" | "mixed"
         - ClassificationResult type: { type: PRType, matchedPaths: string[] }
      2. Create src/services/classification.ts with interface:
         - classifyPR(changedFiles: string[]): Effect<ClassificationResult, never>
      3. Define service interface (no implementation yet)
      4. Add test stub

      **Constraints:**
      - Use union type for PRType (not string enum)
