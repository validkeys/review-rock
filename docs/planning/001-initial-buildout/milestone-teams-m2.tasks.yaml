  - id: m2-001
    name: Create extractReviewVerdict utility function
    description: |
      Create a utility function that parses review content and extracts the verdict
      (approve, request-changes, or comment) with high accuracy. Integrates with
      existing determineReviewLabel for consistency.
    estimate_minutes: 60
    type: code
    dependencies: []
    files:
      create:
        - src/utils/review-parser.ts
      touch_only:
        - src/orchestration/workflow.ts
    instructions: |
      **Objective:**
      Create a utility function to extract review verdict from review content text.

      **Implementation Steps:**
      1. Create new file: src/utils/review-parser.ts
      2. Define the verdict type and return type:
         ```typescript
         /**
          * Review verdict extracted from review content
          */
         export type ReviewVerdict = "approve" | "request-changes" | "comment";

         /**
          * Extracts the review verdict from review content
          *
          * Analyzes review text for explicit verdicts and critical issue markers.
          * Priority order:
          * 1. Explicit "Approve ✅" or "verdict: approve"
          * 2. Explicit "Request Changes ❌" or "verdict: request changes"
          * 3. Critical issues (🔴) → request-changes
          * 4. Default → comment (safest fallback)
          *
          * @param reviewContent - The full review text from Claude
          * @returns The extracted verdict
          */
         export const extractReviewVerdict = (reviewContent: string): ReviewVerdict => {
           const lowerContent = reviewContent.toLowerCase();

           // Check for explicit approval verdict
           if (lowerContent.includes("approve ✅") || lowerContent.includes("verdict: approve")) {
             return "approve";
           }

           // Check for explicit request changes verdict
           if (
             lowerContent.includes("request changes ❌") ||
             lowerContent.includes("verdict: request changes")
           ) {
             return "request-changes";
           }

           // Check for critical issues (🔴)
           if (lowerContent.includes("🔴") || lowerContent.includes("critical")) {
             return "request-changes";
           }

           // Default to comment (safer than approve)
           return "comment";
         };
         ```
      3. Keep the function pure with no external dependencies
      4. Use the same logic as determineReviewLabel from workflow.ts for consistency

      **Constraints:**
      - ONLY create src/utils/review-parser.ts
      - Pure function with no side effects
      - Return type explicitly defined as ReviewVerdict
      - Case-insensitive matching using toLowerCase()
      - Default to "comment" (safest fallback)
      - Follow same patterns as determineReviewLabel

      **TDD Checklist:**
      - [ ] Function is pure (no side effects)
      - [ ] Return type is ReviewVerdict
      - [ ] Case-insensitive matching works
      - [ ] Default to "comment" for ambiguous cases
      - [ ] TypeScript compiles without errors

      **Validation:**
      ```bash
      pnpm run typecheck
      ```
      Expected: No type errors

      **Drift Policy:**
      If you encounter unexpected patterns or dependencies, STOP immediately.
      Do not fix mid-stream. Report the issue and await guidance.

    validation:
      commands:
