milestone: m5
name: Testing & Error Handling
generated: "2026-03-30T18:00:00Z"

style_anchors:
  - path: ~/Sites/ai-use-repos/effect/examples/test-layers.ts
    lines: 1-100
    description: |
      Example of Effect test layers for mocking services in tests.
      Shows how to provide test implementations and verify behavior.
  - path: ~/Sites/ai-use-repos/EffectPatterns/error-testing.ts
    lines: 1-80
    description: |
      Pattern for testing error scenarios with Effect.
      Shows how to test error channels and error recovery.

global_constraints:
  allowed_patterns:
    - "Use @effect/vitest for Effect-aware tests"
    - "Use Effect.provide with test layers for mocking"
    - "Use it.effect for test cases that return Effect"
    - "Test both success and error paths"
    - "Use vitest coverage reports"
  forbidden_patterns:
    - "Skipping error scenario tests"
    - "Hard-coded mocks without type safety"
    - "Tests that don't clean up resources"
    - "Ignoring race conditions in concurrent tests"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - pnpm run typecheck
      - pnpm run lint
      - pnpm run test
      - pnpm run test:coverage
  - stage: task-completion
