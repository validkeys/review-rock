    description: Poll GitHub repository for open PRs every 5 minutes
    priority: high
    rationale: Core polling mechanism drives the entire automation workflow

  - id: FR-2
    category: GitHub Integration
    description: Use GitHub CLI (gh) for all GitHub API operations
    priority: high
    rationale: Leverage existing gh auth and simplify authentication

  - id: FR-3
    category: Coordination
    description: Claim unclaimed PRs by applying a GitHub label atomically
    priority: high
    rationale: Prevents duplicate reviews when multiple instances are running

  - id: FR-4
    category: Classification
    description: Classify PR type as frontend, backend, or mixed based on changed file paths
    priority: high
    rationale: Different PR types require different review skills and focus areas

  - id: FR-5
    category: Classification
    description: Treat files in apps/react-webapp and lib/core-ui-system as frontend code
    priority: high
    rationale: Specific path mapping for validkeys/lumen repository structure

  - id: FR-6
    category: Review Generation
    description: Select review skills based on PR type (frontend → frontend skills, backend → backend skills, mixed → both)
    priority: high
    rationale: Ensures appropriate review criteria are applied to each PR

  - id: FR-7
    category: Review Generation
    description: Call AWS Bedrock with Claude model to generate code review
    priority: high
    rationale: Core AI-powered review capability

  - id: FR-8
    category: Review Generation
    description: Use pre-existing AWS environment variables for Bedrock authentication
    priority: high
