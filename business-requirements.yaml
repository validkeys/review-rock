project: Review Rock
version: "1.0.0"
generated: "2026-03-30T17:00:00Z"

overview:
  problem: |
    Developers spend too much time manually reviewing PRs, creating bottlenecks
    in the development workflow. The manual review process is slow, inconsistent,
    and prevents teams from scaling their code review capacity efficiently.

  value_proposition: |
    Review Rock uses Claude models through AWS Bedrock to automatically review
    pull requests with intelligent, contextual feedback. The system can run on
    multiple developer machines simultaneously, monitoring repositories for new
    PRs and providing fast, consistent review feedback.

  scope:
    in_scope:
      - Poll GitHub repository for new pull requests
      - Claim PRs using GitHub labels to prevent duplicate reviews
      - Classify PRs as frontend, backend, or mixed based on file paths
      - Select appropriate Claude skills based on PR type
      - Generate automated code reviews using AWS Bedrock
      - Post review comments to GitHub PRs
      - Run on multiple machines with distributed coordination
      - Basic logging and error tracking
      - Configurable paths, skills, and polling intervals

    out_of_scope:
      - Microsoft Teams notifications (post-MVP)
      - External database or lock services
      - Complex dashboard or web UI
      - Integration with other platforms (Slack, Jira, etc.)
      - Custom AI model training or fine-tuning

personas:
  - name: Senior Developer
    description: Experienced developer who reviews PRs and wants to reduce manual workload
    goals:
      - Reduce time spent on routine PR reviews
      - Maintain high code quality standards
      - Catch bugs and security issues early
      - Focus on complex architectural decisions
    pain_points:
      - Slow feedback loops delay merges
      - Inconsistent review quality across team
      - PR review becomes a bottleneck
      - Context switching overhead from manual reviews

  - name: Tech Lead
    description: Team leader responsible for code quality and team productivity
    goals:
      - Increase PR throughput across the team
      - Ensure consistent review standards
      - Free up senior developers for strategic work
      - Maintain visibility into review process
    pain_points:
      - Limited review bandwidth slows delivery
      - Inconsistent review depth across reviewers
      - No automated checks for common issues
      - Difficulty scaling review capacity

use_cases:
  - name: Automated PR Review
    actor: Review Rock Script
    description: |
      Script polls GitHub repository every 5 minutes, detects new unclaimed PRs,
      claims a PR by applying a label, analyzes changed files to classify PR type
      (frontend/backend/mixed), selects appropriate review skills, calls AWS Bedrock
      with Claude to perform the review, and posts review comments back to GitHub.
    outcome: PR receives automated review feedback within 5-10 minutes of creation

  - name: Distributed Review Coordination
    actor: Multiple Review Rock Instances
    description: |
      Multiple machines run Review Rock simultaneously. When a machine finds an
      unclaimed PR, it attempts to apply a claim label. GitHub's atomic label
      operations prevent duplicate claims. Only the machine that successfully
      applies the label proceeds with the review.
    outcome: PRs are reviewed exactly once despite multiple running instances

  - name: PR Type Classification
    actor: Review Rock Script
    description: |
      Script analyzes the list of changed files in a PR. Files in apps/react-webapp
      or lib/core-ui-system are classified as frontend. All other files are backend.
      If both frontend and backend files are changed, PR is classified as mixed.
    outcome: Correct review skills are selected based on PR type

functional_requirements:
