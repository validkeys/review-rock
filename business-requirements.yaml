non_functional_requirements:
  performance:
    - Complete PR review within 5-10 minutes of PR creation
    - Support multiple concurrent running instances without conflicts
    - Handle GitHub API rate limits gracefully

  security:
    - Use existing GitHub CLI authentication (no credential storage)
    - Use existing AWS credentials from environment variables
    - Do not expose sensitive data in logs or comments

  usability:
    - Simple command-line interface
    - Clear logging output for monitoring
    - Minimal configuration required

  reliability:
    - Gracefully handle API failures and network issues
    - Release claim labels on fatal errors
    - Resume polling after transient failures

  maintainability:
    - Clean separation between GitHub, classification, and review logic
    - Configurable skill mappings without code changes
    - Clear error messages and logging

success_criteria:
  - criterion: Increased PR throughput
    metric: Number of PRs reviewed per day
    target: 2-3x increase in PRs reviewed compared to manual-only reviews

  - criterion: Faster feedback loops
    metric: Time from PR creation to first review
    target: Under 10 minutes for automated reviews

  - criterion: Reduced manual review time
    metric: Developer hours spent on PR reviews
    target: 50% reduction in time spent on routine reviews

  - criterion: System reliability
    metric: Successful review completion rate
    target: >95% of PRs receive automated review without errors

constraints:
  technical:
    - Must use AWS Bedrock for Claude API access
    - Must use GitHub CLI for GitHub operations
    - Must run on developer machines (distributed deployment)
    - Must work with validkeys/lumen repository structure

  business:
    - MVP delivery within 2-4 weeks
    - No additional external services or databases
    - Use existing authentication mechanisms

  timeline:
    - MVP launch: 2-4 weeks from project start
    - Core functionality prioritized over advanced features

dependencies:
  external:
    - GitHub CLI (gh) must be installed and authenticated
    - AWS Bedrock access with Claude models enabled
    - AWS credentials configured in environment variables
    - Network access to GitHub API and AWS Bedrock

  internal:
    - Frontend review skills/prompts for Claude
    - Backend review skills/prompts for Claude
    - Path classification logic for repository structure

timeline:
  phase: MVP Development
  duration: 2-4 weeks
  milestones:
    - Week 1: GitHub polling and PR claiming mechanism
    - Week 2: PR classification and skill selection logic
    - Week 3: AWS Bedrock integration and review generation
    - Week 4: Error handling, logging, and testing

assumptions:
  - Teams use GitHub for pull request workflows
  - Developers have AWS credentials configured locally
  - GitHub CLI is installed and authenticated on developer machines
  - PRs follow standard structure with clear file change lists
  - Claude models available through AWS Bedrock are suitable for code review
  - GitHub label operations are atomic (prevent race conditions)

risks:
  - risk: Multiple instances claim same PR despite label locking
    probability: low
    impact: medium
    mitigation: Use GitHub label operations which are atomic; add timestamp checks

  - risk: AWS Bedrock API rate limits or throttling
    probability: medium
    impact: medium
    mitigation: Implement exponential backoff; monitor usage; adjust polling frequency

  - risk: GitHub API rate limits with multiple instances
    probability: medium
    impact: medium
    mitigation: Use authenticated gh CLI (higher limits); implement rate limit handling

  - risk: Review quality not meeting team standards
    probability: medium
    impact: high
    mitigation: Iterate on prompt engineering; allow skill customization; keep human reviewers in loop

  - risk: Cost overruns from AWS Bedrock usage
    probability: low
    impact: medium
    mitigation: Monitor API usage; set up billing alerts; optimize prompt length
