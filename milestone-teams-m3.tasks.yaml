global_constraints:
  allowed_patterns:
    - "Use Effect.gen for workflow orchestration"
    - "Provide services via Effect.provideService"
    - "Catch and log errors with Effect.catchAll"
    - "Use Effect.logInfo and Effect.logWarning for logging"
    - "Check config flags before executing optional features"
  forbidden_patterns:
    - "Direct async/await in Effect workflows"
    - "Throwing errors - use Effect.fail instead"
    - "console.log - use Effect.log* instead"
    - "Uncaught exceptions"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - pnpm run lint
      - pnpm run typecheck
      - pnpm run test
  - stage: task-completion
    criteria:
      - All tests passing
      - No lint errors
      - No type errors
      - Notification only sent when enabled
      - Workflow completes on notification failure

