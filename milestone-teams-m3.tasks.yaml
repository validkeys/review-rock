milestone: m3
name: Workflow Integration
generated: 2026-04-01

style_anchors:
  - path: src/orchestration/workflow.ts
    lines: 158-355
    description: |
      Example of processPR workflow with Effect.gen, service dependencies,
      error handling, and multi-step orchestration. Shows proper Effect patterns.
  - path: src/main.ts
    lines: 96-142
    description: |
      Example of Layer.mergeAll for combining multiple service layers and
