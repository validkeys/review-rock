  - id: m3-002
    name: Integrate notification after review posting
    description: |
      Add Teams notification sending after successfully updating the comment with
      review content (around line 288). Respect config flags and handle errors gracefully.
    estimate_minutes: 75
    type: code
    dependencies: [m3-001]
    files:
      modify:
        - src/orchestration/workflow.ts
      touch_only:
        - src/utils/review-parser.ts
        - src/config/schema.ts
    instructions: |
      **Objective:**
      Send Teams notification after successfully posting review comment to GitHub.

      **Implementation Steps:**
      1. Open src/orchestration/workflow.ts
      2. Add import at the top:
         ```typescript
         import { buildReviewNotificationData } from "../utils/review-parser.js";
         ```
      3. Find the line after successfully updating the comment (around line 288):
         ```typescript
         yield* logWithPR(Effect.logInfo(`Successfully updated comment #${commentId}`));
         ```
      4. Add the notification logic after this line:
         ```typescript
         // Step 8.5: Send Teams notification if enabled
         if (config.enableTeamsNotifications && config.teamsWebhookUrl) {
           yield* logWithPR(Effect.logInfo("Sending Teams notification"));

           // Build comment URL (GitHub comment URL format)
           const commentUrl = `${details.url}#issuecomment-${commentId}`;

           // Build notification data
           const notificationData = buildReviewNotificationData(
             details,
             reviewContent,
             commentUrl
           );
           // Set repository from config
           notificationData.repository = repo;

           // Send notification - catch errors to prevent workflow failure
           yield* teamsNotification
             .sendReviewNotification(config.teamsWebhookUrl, notificationData)
             .pipe(
               Effect.catchAll((error) =>
                 logWithPR(
                   Effect.logWarning(
                     `Teams notification failed (non-critical): ${String(error)}`
                   )
                 ).pipe(Effect.as(undefined))
               )
             );
         } else {
           yield* logWithPR(
             Effect.logDebug("Teams notifications disabled or webhook URL not configured")
           );
         }
         ```
      5. Notification runs after comment update but before label changes
      6. Errors are caught and logged as warnings without failing the workflow

      **Constraints:**
      - ONLY modify src/orchestration/workflow.ts
      - Check config.enableTeamsNotifications AND config.teamsWebhookUrl
      - Send notification after successful comment posting
      - Use Effect.catchAll to prevent notification failures from breaking workflow
      - Log warning on failure, debug when disabled
      - Build comment URL using GitHub's format: {prUrl}#issuecomment-{commentId}
      - Mutate notificationData.repository field (acceptable for this context)

      **TDD Checklist:**
      - [ ] Notification sent only when enabled AND webhook URL present
      - [ ] Notification sent after comment update succeeds
      - [ ] Notification errors caught and logged as warnings
      - [ ] Workflow completes successfully even if notification fails
      - [ ] Comment URL built correctly
      - [ ] TypeScript compiles without errors

      **Validation:**
      ```bash
      pnpm run typecheck
      ```
      Expected: No type errors

      **Drift Policy:**
      If you encounter unexpected patterns or dependencies, STOP immediately.
      Do not fix mid-stream. Report the issue and await guidance.

    validation:
      commands:
        - pnpm run typecheck
      expected_output: "No type errors"
      on_failure: "Check Effect patterns and config access"

