  high_priority_issues:
    - category: integration_testing
      severity: high
      issue: M4-001 integration test task uses it.todo() placeholders instead of full implementation
      affected_items: [milestone-teams-m4.tasks.yaml, task m4-001]
      recommendation: |
        The integration test task (m4-001) provides only it.todo() stubs in the instruction examples.
        While the instructions mention "Implement the first test with full mock setup", the actual
        test implementation code is not provided in the code block. This leaves ambiguity about:

        - How to properly mock all services (GitHubService, ClassificationService, ReviewService)
        - How to set up test layers with mocked CommandExecutor
        - How to verify notification payload structure
        - How to assert on fetch mock calls

        Recommendation: Add 2-3 complete test implementation examples showing:
        1. Full service mocking with Layer.succeed pattern
        2. Fetch mock setup and payload verification
        3. Effect.runPromiseExit for error case testing

        Example structure to add:
        ```typescript
        it("should send Teams notification after successful review posting", async () => {
          // Mock services setup
          const mockGitHub = Layer.succeed(GitHubService, {
            removeLabel: () => Effect.succeed(undefined),
            addLabel: () => Effect.succeed(undefined),
            postCommentWithId: () => Effect.succeed(123),
            updateComment: () => Effect.succeed(undefined),
            getPRDetails: () => Effect.succeed({...mockDetails}),
          });
          // ... complete implementation
        });
        ```
      rationale: |
        Integration tests are critical for verifying the end-to-end workflow. Without complete
        examples, developers may struggle with Effect-TS testing patterns and service mocking,
        leading to inconsistent test quality or test failures.
      blocks_development: false
      workaround: Reference tests/services/github.test.ts and tests/integration/review.integration.test.ts for patterns

  medium_priority_issues:
    - category: task_dependency
      severity: medium
      issue: M2 depends on M1 but only needs types from M1-002
      affected_items: [milestone m2]
      recommendation: |
        Milestone M2 (Review Verdict Extraction) is marked as depending on M1 (Teams Notification Service),
        but M2 only needs the ReviewNotificationData type interface defined in M1-002. The full service
        implementation (M1-003, M1-004, M1-005) is not required for M2 to proceed.

        For single-feature-branch strategy this is acceptable since all work is sequential anyway,
        but technically M2 could start after M1-002 completes.

        Options:
        1. Keep current dependency (simpler, enforces completeness)
        2. Change M2 dependency to M1-002 specifically (more granular, allows slight parallelization)
        3. Add note explaining the partial dependency
      rationale: |
        Understanding actual vs. declared dependencies helps with planning and enables optimization
        opportunities if strategy changes in the future.
      impact: low (organizational clarity, no functional impact)

    - category: immutability
      severity: medium
      issue: M3-002 mutates notificationData.repository field after creation
      affected_items: [milestone-teams-m3.tasks.yaml, task m3-002]
      recommendation: |
        Task M3-002 instructs to mutate the notificationData object after creation:
        ```typescript
        const notificationData = buildReviewNotificationData(details, reviewContent, commentUrl);
        notificationData.repository = repo;  // Mutation!
        ```

        This violates the immutability pattern used throughout the Effect-TS codebase.

        Better approach - Update M2-002 to accept repository parameter:
        ```typescript
        export const buildReviewNotificationData = (
          details: PRDetails,
          reviewContent: string,
          commentUrl: string,
          repository: string  // Add parameter
        ): ReviewNotificationData => {
          const verdict = extractReviewVerdict(reviewContent);
          return {
            prNumber: details.number,
            prTitle: details.title,
            prAuthor: details.author,
            prUrl: details.url,
            reviewVerdict: verdict,
            commentUrl,
            repository,  // Include in creation
          };
        };
        ```

        Then update M3-002 to pass repository:
        ```typescript
        const notificationData = buildReviewNotificationData(
          details,
          reviewContent,
          commentUrl,
          repo
        );
        ```
      rationale: |
        - Aligns with functional programming principles
        - Matches Effect-TS patterns used throughout codebase
        - Makes API clearer (all required data passed as parameters)
        - Prevents potential bugs from mutation
        - Easier to test (no side effects)
      impact: medium (code quality improvement, affects 2 tasks)

    - category: test_coverage
      severity: medium
      issue: M2-003 tests don't verify repository field handling
      affected_items: [milestone-teams-m2.tasks.yaml, task m2-003]
      recommendation: |
        The unit tests for buildReviewNotificationData in M2-003 verify most fields but don't
        document the expected behavior for the repository field (currently left empty string).

        Add test case:
        ```typescript
        it("should leave repository empty for caller to populate", () => {
          const result = buildReviewNotificationData(mockPRDetails, reviewContent, commentUrl);
          expect(result.repository).toBe("");
        });
        ```

        If accepting the immutability fix from above, update to:
        ```typescript
        it("should include repository from parameter", () => {
          const result = buildReviewNotificationData(
            mockPRDetails,
            reviewContent,
            commentUrl,
            "test/repo"
          );
          expect(result.repository).toBe("test/repo");
        });
        ```
      rationale: |
        Tests should document expected behavior, especially for fields that have special
        handling patterns (mutation or caller responsibility).
      impact: low (test completeness)

