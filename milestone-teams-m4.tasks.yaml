style_anchors:
  - path: tests/integration/review.integration.test.ts
    lines: 1-50
    description: |
      Example of integration test structure for the review-rock project.
      Shows how to set up integration tests with proper mocking.
  - path: review-rock.config.example.ts
    lines: 1-120
