global_constraints:
  allowed_patterns:
    - "Integration tests verify complete workflows"
    - "Tests use proper mocking for external services"
    - "Documentation includes setup instructions and examples"
    - "Troubleshooting guide covers common issues"
  forbidden_patterns:
    - "Tests that require actual Teams webhooks"
    - "Tests that make real API calls"
    - "Documentation without examples"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - pnpm run lint
      - pnpm run typecheck
      - pnpm run test
  - stage: task-completion
    criteria:
      - All tests passing (unit and integration)
      - No lint errors
      - No type errors
      - Documentation clear and actionable

