         # Release Checklist

         ## Pre-Release
         - [ ] All tests passing: `pnpm test`
         - [ ] Coverage ≥80%: `pnpm test:coverage`
         - [ ] No type errors: `pnpm run typecheck`
         - [ ] No lint errors: `pnpm run lint`
         - [ ] Build succeeds: `pnpm run build`
         - [ ] Manual smoke test completed (tests/e2e/smoke-test.md)
         - [ ] CHANGELOG.md updated with new version
         - [ ] package.json version bumped

         ## Publishing to npm
         ```bash
         # Verify you're logged in to npm
         npm whoami

         # Dry run to verify package contents
         npm pack --dry-run

         # Publish to npm
         pnpm publish --access public

         # Verify package is available
         npm view review-rock
         ```

         ## Post-Release
         - [ ] Tag release in git: `git tag v0.1.0 && git push --tags`
         - [ ] Create GitHub release with changelog
         - [ ] Test global installation: `pnpm install -g review-rock`
         - [ ] Update documentation if needed

         ## Rollback (if needed)
         ```bash
         # Deprecate version (cannot unpublish after 72h)
         npm deprecate review-rock@0.1.0 "Use version X.X.X instead"
         ```

      **Constraints:**
      - Follow npm publishing best practices
      - Include verification steps
      - Document rollback procedure

      **TDD Checklist:**
      - N/A (documentation)

      **Validation:**
      ```bash
