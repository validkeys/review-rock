  - id: m6-003
    name: Write troubleshooting guide
    description: |
      Create comprehensive troubleshooting guide for common issues:
      token expiry, skill not found, rate limits, network errors.
    estimate_minutes: 75
    type: docs
    dependencies: [m6-002]
    files:
      create:
        - TROUBLESHOOTING.md
      modify: []
      touch_only: []
    instructions: |
      **Objective:**
      Help users diagnose and fix common problems.

      **Implementation Steps:**
      1. Create TROUBLESHOOTING.md with sections:

         **AWS SSO Token Expired**
         - Symptom: Error "AWS SSO token expired"
         - Cause: Tokens expire after 1 hour
         - Solution: Run `aws sso login` to refresh
         - Prevention: Set up longer session durations in AWS IAM Identity Center

         **Skill Not Found**
         - Symptom: Error "Skill 'X' not found"
         - Cause: Skill not installed in claudecode
         - Solution: Install skill with `claudecode skill add <skill-url>`
         - Verification: List skills with `claudecode skill list`

         **GitHub Rate Limit**
         - Symptom: Error "API rate limit exceeded"
         - Cause: Too many API calls
         - Solution: Wait for rate limit reset, reduce polling frequency
         - Prevention: Use authenticated gh CLI (higher limits)

         **Multiple Instances Claiming Same PR**
         - Symptom: Duplicate reviews posted
         - Cause: Race condition (should be rare)
         - Solution: Check label operations are atomic, verify GitHub API behavior
         - Mitigation: Add timestamp to claim label

         **Command Not Found: review-rock**
         - Symptom: Command not found after installation
         - Cause: pnpm global bin not in PATH
         - Solution: Add pnpm bin to PATH or use `pnpm exec review-rock`

         **Command Not Found: gh**
         - Symptom: Error "gh command not found"
         - Cause: GitHub CLI not installed
         - Solution: Install gh from https://cli.github.com/

         **Permission Denied on GitHub**
         - Symptom: Error when posting comment
         - Cause: gh not authenticated or insufficient permissions
         - Solution: Run `gh auth login` and verify repository access

      **Constraints:**
      - Each issue: symptom, cause, solution, prevention
      - Include actual error messages users will see
      - Provide commands to fix issues

      **TDD Checklist:**
      - N/A (documentation)

      **Validation:**
      ```bash
      cat TROUBLESHOOTING.md
      ```
      Expected: Comprehensive troubleshooting guide

      **Drift Policy:**
      Add new issues as they are discovered in testing.

    validation:
      commands:
        - test -f TROUBLESHOOTING.md
        - grep -q "AWS SSO Token Expired" TROUBLESHOOTING.md
      expected_output: "Troubleshooting guide exists with common issues"
      on_failure: "Complete troubleshooting guide"

